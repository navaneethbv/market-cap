name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  checks:
    name: Lint, test, build, and run
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
      NEXT_PUBLIC_FINNHUB_API_KEY: ${{ secrets.NEXT_PUBLIC_FINNHUB_API_KEY }}
      TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      # Boots the production server and checks it serves a page. Skipped
      # until the repo secrets above are configured, because pages talk to
      # Supabase at request time.
      - name: Run smoke
        if: env.NEXT_PUBLIC_SUPABASE_URL != ''
        run: |
          npm run start &
          SERVER_PID=$!
          for i in $(seq 1 30); do
            curl -sf -o /dev/null http://localhost:3000/login && break
            sleep 1
          done
          curl -sf -o /dev/null -w "GET /login -> %{http_code}\n" http://localhost:3000/login
          kill $SERVER_PID
